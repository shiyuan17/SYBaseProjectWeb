name: pr-packet

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  validate-pr-packet:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Check out the PR base ref so the validator script cannot be weakened
      # from within the PR branch itself (see TECH_DEBT.md TD-20260610-002).
      - name: Checkout base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Write PR body to file
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > pr-body.md

      - name: Validate PR Workflow Packet
        run: node scripts/validate-pr-packet.mjs --body-file pr-body.md
